name: CD (Deploy to EC2)

on:
  workflow_run:
    workflows: ["CI (build, validate, test)"]   # 👈 the CI workflow name
    types: [completed]                          # trigger after CI finishes
    branches: ["main"]                          # only for main branch

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}  # 👈 only if CI = success
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              set -e
              echo "=== Connected to EC2 ==="
              cd /home/ubuntu
            
              # Make sure the folder exists
              mkdir -p farmland-backend
            
              cd farmland-backend
            
              # If repo already exists, pull latest
              if [ -d ".git" ]; then
                echo "=== Existing repo detected: pulling latest changes ==="
                git fetch origin main
                git reset --hard origin/main
              else
                echo "=== No repo found: cleaning code but preserving .env ==="
                # Preserve .env if it exists
                if [ -f ".env" ]; then
                  mv .env /home/ubuntu/.env.bak
                fi
            
                # Remove everything except .env backup
                rm -rf *
            
                # Clone fresh repo
                git clone https://github.com/Spidey023/Farmer.git .
                
                # Restore .env
                if [ -f "/home/ubuntu/.env.bak" ]; then
                  mv /home/ubuntu/.env.bak .env
                fi
              fi
            
              echo "=== Building Docker image ==="
              docker build -t farmer-backend .
            
              echo "=== Restarting container ==="
              docker stop api || true
              docker rm api || true
              docker run -d --name api -p 3000:3000 --env-file .env farmer-backend
            
              echo "=== Running Prisma migrations ==="
              docker exec api npx prisma migrate deploy
            
              echo "=== Checking API health ==="
              curl -sf http://localhost:3000/health || (docker logs api && exit 1)
