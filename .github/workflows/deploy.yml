name: Build & Deploy (Prod)

on:
  push:
    branches: ["main"]

jobs:
  build_and_push_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - name: corrent dir folders
        run: ls -la
      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/farmland-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=ghcr.io/${{ github.repository }}/farmland-backend:${{ github.sha }}" >> $GITHUB_ENV

  deploy_to_ec2:
    needs: build_and_push_image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            cd /home/ubuntu/farmland-backend

            # Pull latest image
            docker pull $IMAGE_TAG

            # Stop old container
            if [ "$(docker ps -q -f name=api)" ]; then
              docker stop api && docker rm api
            fi

            # Run new container
            docker run -d --name api -p 3000:3000 --env-file .env $IMAGE_TAG

            # Apply DB migrations (DIRECT URL)
            docker exec api npx prisma migrate deploy

            # Healthcheck
            sleep 3
            curl -sf http://localhost:3000/health || (docker logs api && exit 1)
