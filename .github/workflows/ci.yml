name: CI (build, validate, test)

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: backend

      - name: Prisma checks
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: |
          npx prisma generate
          npx prisma validate
        working-directory: backend

      - name: Build project
        run: npm run build
        working-directory: backend
