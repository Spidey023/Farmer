name: CI (build, validate, test)

on:
  push:
    branches: ["**"]        # Runs automatically when you push
  pull_request:              # Runs for PRs
  workflow_dispatch: {}      # Enables "Run workflow" button in Actions tab

# 👇 change this to your actual folder if needed
defaults:
  run:
    working-directory: backend

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - uses: actions/checkout@v4

      # Step 2: Debug structure (to confirm where lockfile lives)
      - name: Debug repo structure
        run: |
          echo "---- Current directory ----"
          pwd
          echo "---- Root files ----"
          ls -la
          echo "---- Backend folder ----"
          ls -la backend || echo "No backend folder found"
          echo "---- Searching for package-lock.json ----"
          find . -name "package-lock.json"

      # Step 3: Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: backend/package-lock.json  # 👈 change this if not in backend

      # Step 4: Install dependencies
      - name: Install deps
        run: npm ci

      # Step 5: Prisma schema validation
      - name: Prisma checks
        run: |
          npx prisma generate
          npx prisma validate
          npx prisma migrate status

      # Step 6: TypeScript type checking
      - name: Typecheck
        run: npm run typecheck --if-present

      # Step 7: Lint code
      - name: Lint
        run: npm run lint --if-present

      # Step 8: Build TS → JS
      - name: Build project
        run: npm run build
